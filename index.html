<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />

    <!-- Title (SEO optimized) -->
    <title>
      FreshBasket | Online Grocery Delivery - Fresh Fruits, Vegetables & Dairy
    </title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="FreshBasket is your online grocery store for fresh fruits, vegetables, dairy, meat, and seafood. Get fresh products delivered fast to your doorstep."
    />

    <!-- Keywords (light use only - Google mostly ignores now) -->
    <meta
      name="keywords"
      content="freshbasket, online grocery delivery, fresh fruits, vegetables, dairy, meat, seafood, organic grocery store"
    />

    <meta name="author" content="FreshBasket" />
    <meta name="robots" content="index, follow" />

    <!-- Google Site Verification -->
    <meta
      name="google-site-verification"
      content="8V9h_v_4zuMte3CTgM1vdv70nQPxUh7WfFTlNtiC2kk"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://fresh-basket-two.vercel.app/" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FreshBasket" />
    <meta
      property="og:title"
      content="FreshBasket | Online Grocery Delivery"
    />
    <meta
      property="og:description"
      content="Order fresh fruits, vegetables, dairy, meat, and seafood online with fast delivery."
    />
    <meta
      property="og:url"
      content="https://fresh-basket-two.vercel.app/"
    />
    <meta property="og:image" content="https://fresh-basket-two.vercel.app/icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="FreshBasket | Online Grocery Delivery"
    />
    <meta
      name="twitter:description"
      content="Fresh fruits, vegetables, dairy & groceries delivered fast."
    />
    <meta
      name="twitter:image"
      content="https://fresh-basket-two.vercel.app/icon.png"
    />

    <!-- Schema Markup (Local Business / Store) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GroceryStore",
        "name": "FreshBasket",
        "url": "https://fresh-basket-two.vercel.app/",
        "logo": "https://fresh-basket-two.vercel.app/icon.png",
        "description": "FreshBasket is an online grocery store offering fresh fruits, vegetables, dairy, meat, and seafood with fast delivery."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
