<!doctype html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />

    <!-- Title -->
    <title>FreshBasket | Fresh Fruits, Vegetables & Groceries Online</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="FreshBasket offers fresh fruits, vegetables, dairy products, and groceries delivered to your doorstep. Shop fresh and healthy products online."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="FreshBasket, online grocery, fresh fruits, vegetables, groceries, organic food, grocery delivery"
    />

    <!-- Author -->
    <meta name="author" content="FreshBasket" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="FreshBasket | Fresh Fruits, Vegetables & Groceries Online"
    />
    <meta
      property="og:description"
      content="Order fresh fruits, vegetables, and groceries online from FreshBasket."
    />
    <meta
      property="og:url"
      content="https://fresh-basket-two.vercel.app/"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="FreshBasket | Fresh Fruits, Vegetables & Groceries Online"
    />
    <meta
      name="twitter:description"
      content="Order fresh fruits, vegetables, and groceries online from FreshBasket."
    />
    <meta name="twitter:image" content="/icon.png" />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://fresh-basket-two.vercel.app/"
    />

    <!-- Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "FreshBasket",
        "url": "https://fresh-basket-two.vercel.app/",
        "description": "Online grocery store providing fresh fruits, vegetables, and daily essentials.",
        "logo": "https://fresh-basket-two.vercel.app/icon.png"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
